    .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}

    }

    }

      border-radius:30px;
      background:rgba(255,247,251,.95);

      padding:18px 18px 14px;

</head>

      <div class="map-credit">本地图来源于阿里云DataV.GeoAtlas地理小工具</div>
      <div class="loading" id="loading">地图加载中…</div>
    </section>

    <aside class="panel empty" id="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title" id="panelTitle">选择一个城市</div>
          <div class="panel-meta" id="panelMeta">当前共 24 个城市有打卡点</div>
        </div>

      </div>
      <div class="panel-body" id="panelBody">
        <div class="empty-state">
          在地图上悬停城市标点可预览商场；点击城市标点后，详情会显示在这里。
          <div class="city-list" id="cityList"></div>
        </div>
      </div>
    </aside>
  </main>
</div>

<div class="notice-modal" id="delayNotice" role="dialog" aria-modal="true" aria-labelledby="delayNoticeTitle">

        <p class="notice-date">2026年6月21日</p>

      <section class="notice-item">

    </div>
    <button class="notice-confirm" id="delayNoticeConfirm" type="button" autofocus>我知道了</button>
  </div>
</div>

function normalizeName(name=''){
  return String(name)
    .replace(/(市|省|地区|盟|自治州|特别行政区|壮族自治区|回族自治区|维吾尔自治区|自治区)$/,'')
    .replace(/^内蒙古$/,'内蒙古')
    .trim();
}
function escapeHtml(str=''){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function hasFreebie(city){
  return CHECKIN_DATA[city]?.malls.some(m => /无料|领取/.test(m.note || ''));
}
function hasOfflineCheckin(city){
  return CHECKIN_DATA[city]?.malls.some(m => /线下打卡点/.test(m.note || ''));
}
function hasWarning(city){
  return CHECKIN_DATA[city]?.malls.some(m => Boolean(m.warning));
}
function cityBadges(city){
  return `${hasWarning(city) ? ' ⚠️' : ''}${hasFreebie(city) ? ' ✨' : ''}${hasOfflineCheckin(city) ? ' 📝' : ''}`;
}
function cityDisplayName(city){
  return `${city}${cityBadges(city)}`;
}
function mapCityDisplayName(city){
  return cityDisplayName(city).replace(/\s+/g, '');
}
function renderCityChip(city){
  const label = `${escapeHtml(city)}${cityBadges(city)}`;
  return `<button class="city-chip" data-city="${escapeHtml(city)}">${label}</button>`;
}

const MAP_LABEL_OVERRIDES = {
  '北京': {position:'top', distance:8},
  '廊坊': {position:'bottom', distance:8},
  '苏州': {position:'top', distance:8},
  '南京': {position:'bottom', distance:8},
  '上海': {position:'right', distance:8},
  '广州': {position:'top', distance:8},
  '深圳': {position:'bottom', distance:8},
  '南宁': {position:'left', distance:8},
  '合肥': {position:'left', distance:8}
};
function mapLabelOverride(city){
  return MAP_LABEL_OVERRIDES[city] ? {label: MAP_LABEL_OVERRIDES[city]} : {};
}
function cityTooltip(city){
  const item = CHECKIN_DATA[city];
  if(!item) return '';
  const malls = item.malls.map(m => `<li>${escapeHtml(m.name)}</li>`).join('');
  return `<div class="tooltip"><div class="t-title">${escapeHtml(cityDisplayName(city))} · ${item.malls.length} 个点位</div><ul>${malls}</ul><div style="margin-top:8px;color:#946175">点击查看详情</div></div>`;
}
function openPanel(city){
  const item = CHECKIN_DATA[city];
  if(!item) return;
  $('panel').classList.remove('empty');
  $('backBtn').hidden = false;
  $('panelTitle').textContent = cityDisplayName(city);
  $('panelMeta').textContent = `${item.malls.length} 个可打卡商场 / 点位`;
  $('panelBody').innerHTML = item.malls.map(m => `
    <article class="mall">
      <h3>${escapeHtml(m.name)}</h3>
      <div class="kv">
        <div class="k">具体位置</div><div class="v">${m.positions.map(escapeHtml).join('、')}</div>
        <div class="k">日期</div><div class="v">${escapeHtml(m.date)}</div>
        <div class="k">时间</div><div class="v">${escapeHtml(m.time)}</div>
      </div>
      ${m.note ? `<div class="tag">✨ ${escapeHtml(m.note)}</div>` : ''}
      ${m.warning ? `<div class="tag warning">⚠️ ${escapeHtml(m.warning)}</div>` : ''}
    </article>
  `).join('');
}
function emptyPanel(){
  $('panel').classList.add('empty');
  $('backBtn').hidden = true;
  $('panelTitle').textContent = '选择一个城市';
  $('panelMeta').textContent = `当前共 ${cityNames.length} 个城市有打卡点`;
  $('panelBody').innerHTML = `<div class="empty-state">
    在地图上悬停城市标点可预览商场；点击城市标点后，详情会显示在这里。
    <div class="city-list">${cityNames.map(renderCityChip).join('')}</div>
  </div>`;
}

const CITY_PROVINCES = {
  '上海':'上海',
  '重庆':'重庆',
  '广州':'广东',
  '深圳':'广东',
  '苏州':'江苏',
  '南京':'江苏',
  '北京':'北京',
  '武汉':'湖北',
  '成都':'四川',
  '长沙':'湖南',
  '南宁':'广西',
  '贵阳':'贵州',
  '郑州':'河南',
  '杭州':'浙江',
  '福州':'福建',
  '济南':'山东',
  '合肥':'安徽',
  '南昌':'江西',
  '沈阳':'辽宁',
  '兰州':'甘肃',
  '廊坊':'河北',
  '哈尔滨':'黑龙江',
  '西安':'陕西',
  '西宁':'青海'
};

function buildProvinceRegionData(){
  const provinceCities = new Map();

  cityNames.forEach(city => {
    const province = CITY_PROVINCES[city];
    if(!province) return;
    if(!provinceCities.has(province)) provinceCities.set(province, []);
    provinceCities.get(province).push(city);
  });

  return Array.from(provinceCities, ([province, cities]) => {
    const isJiangxi = province === '江西';
    return {
      name: province,
      cities,
      value: cities.length,
      itemStyle: {
        areaColor:'#ffeaf2',
        borderColor:'rgba(255,155,192,.55)',
        borderWidth:.9,
        shadowBlur:0,
        shadowColor:'rgba(229,0,87,.26)',
        ...(isJiangxi ? {
          decal:{
            symbol:'rect',
            symbolSize:1,
            color:'rgba(255,255,255,.96)',
            backgroundColor:'#ffeaf2',
            dashArrayX:[1,0],
            dashArrayY:[4,3],
            rotation:-Math.PI / 4
          }
        } : {})
      },
      emphasis: {
        itemStyle: {
          areaColor:'#ffdce9'
        }
      }
    };
  });
}

function buildMapRegionData(){
  return [
    ...buildProvinceRegionData(),
    {
      name:'南海十段线',
      value:0,
      itemStyle:{
        areaColor:'#e50057',
        borderColor:'#e50057',
        borderWidth:.5,
        opacity:.72
      },
      emphasis:{
        disabled:true,
        label:{show:false},
        itemStyle:{
          areaColor:'#e50057',
          borderColor:'#e50057',
          opacity:.82
        }
      },
      tooltip:{show:false}
    }
  ];
}

function buildPointData(){
  return cityNames.map(city => ({
    name: city,
    city,
    value: [...CHECKIN_DATA[city].coord, CHECKIN_DATA[city].malls.length],
    symbolSize: Math.max(3.5, Math.min(9.5, (CHECKIN_DATA[city].malls.length * 6 + 8) / 3)),
    itemStyle:{color:'#e50057', shadowBlur:12, shadowColor:'rgba(229,0,87,.35)'},
    ...mapLabelOverride(city)
  }));
}

function buildHitAreaData(pointData){
  return pointData.map(({name, city, value}) => ({name, city, value}));
}

function provinceTooltip(province, cities){
  const cityList = cities.map(city => `<li>${escapeHtml(city)}</li>`).join('');
  return `<div class="tooltip"><div class="t-title">${escapeHtml(province)} · ${cities.length} 个打卡城市</div><ul>${cityList}</ul><div style="margin-top:8px;color:#946175">点击城市标点查看详情</div></div>`;
}

function tooltipFormatter(params){
  if(params.name === '南海十段线') return '';
  const city = params.data?.city || normalizeName(params.name);
  if(CHECKIN_DATA[city]) return cityTooltip(city);
  if(params.data?.cities?.length) return provinceTooltip(params.name || '', params.data.cities);
  return `${escapeHtml(params.name || '')}<br/><span style="color:#946175">暂无打卡点</span>`;
}

function showCityTip(chart, city){
  const cityIndex = chart.__pointIndex?.get(city);
  if(cityIndex !== undefined){
    chart.dispatchAction({type:'showTip', seriesIndex:chart.__pointSeriesIndex ?? 1, dataIndex:cityIndex});
  }
}

const CHINA_MAP_NAME = 'aliyun-china';
const CHINA_GEOJSON_URL = '/api/amap/china-geojson';

async function fetchChinaGeoJson(){
  const response = await fetch(CHINA_GEOJSON_URL, {headers:{Accept:'application/json'}});
  let payload = null;
  try{
    payload = await response.json();
  }catch(_err){
    payload = null;
  }

  if(!response.ok){
    throw new Error(payload?.error || `阿里云 GeoJSON 接口请求失败（HTTP ${response.status}）`);
  }
  if(payload?.type !== 'FeatureCollection' || !Array.isArray(payload.features)){
    throw new Error('阿里云 GeoJSON 数据格式不正确');
  }
  return payload;
}

function buildSouthChinaSeaLineData(collection){
  const features = collection?.features || [];
  return features.flatMap((feature, index) => {
    const geometry = feature.geometry || {};
    if(geometry.type === 'LineString'){
      return [{
        name:feature.properties?.name || '南海十段线',
        coords:geometry.coordinates,
        value:index
      }];
    }
    if(geometry.type === 'MultiLineString'){
      return geometry.coordinates.map((coords, partIndex) => ({
        name:feature.properties?.name || '南海十段线',
        coords,
        value:`${index}-${partIndex}`
      }));
    }
    return [];
  });
}

async function initChart(){
  const chinaGeoJson = await fetchChinaGeoJson();
  echarts.registerMap(CHINA_MAP_NAME, chinaGeoJson);

  const chart = echarts.init($('map'), null, {renderer:'canvas'});
  const mapRegionData = buildMapRegionData();
  const pointData = buildPointData();
  const hitAreaData = buildHitAreaData(pointData);
  const southChinaSeaLineData = buildSouthChinaSeaLineData(chinaGeoJson.southChinaSeaLines);
  const pointIndex = new Map(pointData.map((item, index) => [item.city, index]));

  const option = {
    backgroundColor:'transparent',
    tooltip:{
      trigger:'item',
      borderWidth:0,
      backgroundColor:'rgba(255,255,255,.96)',
      extraCssText:'box-shadow:0 14px 35px rgba(160,0,72,.18);border-radius:14px;padding:12px;',
      formatter:tooltipFormatter
    },
    geo:{
      map:CHINA_MAP_NAME,
      roam:true,
      zoom:1.18,
      scaleLimit:{min:.8,max:8},
      boundingCoords:[[73,3],[136,54]],
      regions:mapRegionData,
      label:{show:false},
      itemStyle:{areaColor:'#fffafd',borderColor:'#ffb6d0',borderWidth:1},
      emphasis:{label:{show:false},itemStyle:{areaColor:'#fff0f6'}},
      select:{disabled:true}
    },
    series:[
      {
        name:'省级区划',
        type:'map',
        map:CHINA_MAP_NAME,
        geoIndex:0,
        data:mapRegionData,
        selectedMode:false,
        label:{show:false},
        itemStyle:{areaColor:'#fffafd',borderColor:'#ffb6d0',borderWidth:1},
        emphasis:{label:{show:false},itemStyle:{areaColor:'#fff0f6'}},
        z:1,
        tooltip:{show:true}
      },
      {
        name:'南海十段线',
        type:'lines',
        coordinateSystem:'geo',
        polyline:true,
        data:southChinaSeaLineData,
        symbol:'none',
        silent:true,
        lineStyle:{color:'#e50057',width:1.2,type:'dashed',opacity:.72},
        z:4,
        tooltip:{show:false}
      },
      {
        name:'打卡城市',
        type:'effectScatter',
        coordinateSystem:'geo',
        data:pointData,
        rippleEffect:{period:3,scale:3,brushType:'stroke'},
        label:{show:true,formatter:(params) => mapCityDisplayName(params.data?.city || params.name),position:'right',fontWeight:900,color:'#e50057',textBorderColor:'#fff',textBorderWidth:3},
        z:8,
        tooltip:{show:true},
        emphasis:{scale:true}
      },
      {
        name:'城市交互热区',
        type:'scatter',
        coordinateSystem:'geo',
        data:hitAreaData,
        symbol:'circle',
        symbolSize:30,
        itemStyle:{color:'rgba(229,0,87,.001)', opacity:1},
        emphasis:{disabled:true},
        cursor:'pointer',
        z:12,
        tooltip:{show:true}
      }
    ]
  };

  chart.setOption(option);
  chart.__pointIndex = pointIndex;
  chart.__pointSeriesIndex = 2;
  chart.on('click', (params) => {
    const city = params.data?.city || normalizeName(params.name);
    if(CHECKIN_DATA[city]) openPanel(city);
  });
  window.addEventListener('resize', () => chart.resize());
  $('loading').style.display = 'none';
  $('hint').style.display = 'none';

  return chart;
}

(async function main(){
  try{
    const chart = await initChart();

    $('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if(!q) return;
      const city = cityNames.find(c =>
        c.toLowerCase().includes(q) ||
        CHECKIN_DATA[c].malls.some(m => m.name.toLowerCase().includes(q))
      );
      if(city){
        openPanel(city);
        showCityTip(chart, city);
      }
    });

    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-city]');
      if(btn) openPanel(btn.dataset.city);
    });
    $('backBtn').onclick = emptyPanel;
  }catch(err){
    $('loading').innerHTML = `地图加载失败：${escapeHtml(err.message)}<br><small>请检查 /api/amap/china-geojson 函数和 Cloudflare R2 绑定。</small>`;
  }
})();
</script>
